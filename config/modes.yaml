# ── KRONOS · config/modes.yaml ────────────────────────────────
# Single source of truth for analysis modes.
#
# Loaded by pipeline/registry.py at app import. Each entry validated
# against pipeline.registry.ModeDefinition (extra="forbid"); typos
# fail the app at startup, not at request time.
#
# A mode entry maps to:
#   - cube_slice: a slicer registered via @register_slicer in
#                 pipeline/processors/lending/<slug>.py
#   - prompt_template: a markdown file under config/prompts/
#   - parameters: an optional list of parameter pickers populated
#                 either statically (`values:`) or at runtime from
#                 the cube (`source: cube.<field>`).
#
# Parameter substitution in prompts uses simple {{name}} replacement
# (no Jinja). Example: prompt template references {{portfolio}} →
# server replaces it with the validated parameter value before the
# LLM call.
#
# To add a new mode, see docs/adding-a-mode.md.
# ──────────────────────────────────────────────────────────────

modes:

  # ── Active modes ──────────────────────────────────────────────

  - slug: firm-level
    display_name: Firm-Level View
    description: >
      Commitment, outstanding & C&C exposure. High-level view of the
      entire credit portfolio, including current KRIs and watchlist
      aggregates.
    user_prompt: >
      Provide a firm-level portfolio snapshot. Cover total committed
      and outstanding exposure, the breadth of parents and industries,
      and the criticized & classified exposure both in dollars and as
      a percentage of commitment.
    parameters: []
    cube_slice: firm_level
    prompt_template: firm_level_base.md
    status: active

  # ── Parameterized portfolio modes ─────────────────────────────
  # Two distinct portfolio kinds — see docs/future-work.md for the
  # semantic distinction:
  #   industry portfolio   — partition of facilities by Risk
  #                          Assessment Industry (every facility
  #                          is in exactly one industry)
  #   horizontal portfolio — boolean overlay (Leveraged Finance,
  #                          Global Recovery Management) — a
  #                          facility can be in zero, one, or more
  #
  # Parameter sources (`cube.available_industries` /
  # `cube.available_horizontals`) name the kind explicitly so a
  # picker can never silently mix the two.

  - slug: industry-portfolio-level
    display_name: Industry Portfolio Analysis
    description: >
      Deep-dive on one industry portfolio (the partition of facilities
      by Risk Assessment Industry). Covers slice-level KRIs, the five-
      category rating composition within the industry, top parent and
      facility-level WAPD contributors within the industry, and the
      industry's share of the firm-level watchlist.
    user_prompt: >
      Provide a detailed analysis of the {{portfolio}} industry portfolio.
      Cover its KRIs, rating-category composition (IG / NIG / of-which
      Distressed / Defaulted / Non-Rated), top contributors, top WAPD
      drivers, and any watchlist entries within the industry.
    parameters:
      - name: portfolio
        type: enum
        source: cube.available_industries
        required: true
        display_label: Industry Portfolio
    cube_slice: industry_portfolio_level
    prompt_template: industry_portfolio_level_base.md
    status: active

  - slug: horizontal-portfolio-level
    display_name: Horizontal Portfolio Analysis
    description: >
      Deep-dive on one horizontal portfolio (Leveraged Finance, Global
      Recovery Management, …). Covers slice-level KRIs, the five-
      category rating composition within the horizontal, top parent
      and facility-level WAPD contributors within the horizontal, and
      the horizontal's share of the firm-level watchlist.
    user_prompt: >
      Provide a detailed analysis of the {{portfolio}} horizontal
      portfolio. Cover its KRIs, rating-category composition (IG / NIG
      / of-which Distressed / Defaulted / Non-Rated), top contributors,
      top WAPD drivers, and any watchlist entries within the horizontal.
    parameters:
      - name: portfolio
        type: enum
        source: cube.available_horizontals
        required: true
        display_label: Horizontal Portfolio
    cube_slice: horizontal_portfolio_level
    prompt_template: horizontal_portfolio_level_base.md
    status: active

  # ── Parameterized placeholders (slicers pending) ──────────────
  # Backend parameter validation + /cube/parameter-options resolution
  # is fully wired. The slicers themselves are pending — clicking
  # these in the UI surfaces "mode_not_implemented" until written.

  - slug: portfolio-comparison
    display_name: Industry Portfolio Comparison
    description: >
      Compare two industry portfolios side by side across KRIs and
      contributors. (For comparing two horizontals or an industry
      vs a horizontal, see industry-within-horizontal — same engine
      generalises to both.)
    user_prompt: >
      Compare the {{portfolio_a}} and {{portfolio_b}} industry portfolios
      side by side. Cover KRIs, rating-category composition, top
      contributors, and any divergence in credit quality.
    parameters:
      - name: portfolio_a
        type: enum
        source: cube.available_industries
        required: true
        display_label: First Industry Portfolio
      - name: portfolio_b
        type: enum
        source: cube.available_industries
        required: true
        display_label: Second Industry Portfolio
    cube_slice: portfolio_comparison
    prompt_template: portfolio_comparison.md
    status: placeholder

  - slug: industry-within-horizontal
    display_name: Industry × Horizontal Cross-Cut
    description: >
      Cross-cut analysis: facilities that sit in BOTH an industry
      partition AND a horizontal overlay (e.g. Tech facilities within
      Leveraged Finance). See docs/future-work.md for the planned
      cube extension.
    user_prompt: >
      Analyze facilities in the {{industry}} industry that are also
      flagged into the {{horizontal}} horizontal portfolio. Cover the
      cross-cut KRIs, rating composition, top contributors, and any
      divergence from either parent slice.
    parameters:
      - name: industry
        type: enum
        source: cube.available_industries
        required: true
        display_label: Industry
      - name: horizontal
        type: enum
        source: cube.available_horizontals
        required: true
        display_label: Horizontal Portfolio
    cube_slice: industry_within_horizontal
    prompt_template: industry_within_horizontal.md
    status: placeholder

  # ── Placeholder modes (UI button visible, backend not wired) ──
  # These render in the canned-prompt grid but return
  # `{ error: "mode_not_implemented" }` from /upload.

  - slug: concentration-risk
    display_name: Concentration Risk
    description: Exposure by segment & sector.
    user_prompt: >
      Analyze concentration risk across the portfolio. Identify
      segments where exposure is elevated, flag any single-name or
      sector concentrations, and compare against prior periods.
    parameters: []
    status: placeholder

  - slug: delinquency-trends
    display_name: Delinquency Trends
    description: 30/60/90+ day buckets & drivers.
    user_prompt: >
      Deep dive on delinquency trends. What is driving late payments,
      which vintages or segments show the most stress, and how have
      the 30/60/90+ day buckets trended?
    parameters: []
    status: placeholder

  - slug: risk-segments
    display_name: Risk Segments
    description: Highest-risk exposures & outlook.
    user_prompt: >
      Identify the highest-risk segments in the portfolio. Explain
      which metrics are driving elevated risk and what the near-term
      outlook looks like for those segments.
    parameters: []
    status: placeholder

  - slug: exec-briefing
    display_name: Exec Briefing
    description: Board-ready summary & action items.
    user_prompt: >
      Summarize portfolio performance for an executive audience. Three
      to five bullet points: headline numbers, trend direction, and one
      clear action item.
    parameters: []
    status: placeholder

  - slug: stress-outlook
    display_name: Stress Outlook
    description: Downside scenario & loss capacity.
    user_prompt: >
      How would this portfolio perform under a moderate economic stress
      scenario? Use the current metrics to assess loss absorption
      capacity and identify the most vulnerable segments.
    parameters: []
    status: placeholder


# ── Reserved sections ─────────────────────────────────────────
# Reserved for a future iteration. Synthesis templates compose multiple
# mode outputs into a single coherent document (e.g., risk assessments
# spanning lending + traded products + firm-level). Not implemented in
# this refactor.
syntheses: []

# Reserved for a future iteration. Length directives modify SYNTHESIS
# output length (full report, executive briefing, quick update for a
# multi-mode synthesis document). Not implemented in this refactor.
#
# IMPORTANT — orthogonal to the request-level `length` field added in
# the Scope × Length refactor (Round 19). The request-level `length`
# is a per-/upload payload field — "full" | "executive" | "distillation",
# default "full" — composed onto a single mode's base prompt by
# pipeline/registry.py::compose_prompt(). The YAML `lengths:`
# reservation below is for synthesis-template length specs at the
# synthesis layer, a different concern. Do not conflate the two.
lengths: []
